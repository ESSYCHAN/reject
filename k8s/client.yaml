# Client Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: reject
  labels:
    app: reject
    component: client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reject
      component: client
  template:
    metadata:
      labels:
        app: reject
        component: client
    spec:
      containers:
        - name: client
          image: ghcr.io/OWNER/reject-client:latest  # Replace OWNER
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: reject
spec:
  selector:
    app: reject
    component: client
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
