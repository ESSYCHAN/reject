# ============================================
# REJECT CI Pipeline
# ============================================
# Runs on every push and PR to main
# Tests all 3 services: client, server, agents

name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  # ----- CLIENT (React/TypeScript) -----
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          VITE_API_URL: http://localhost:8787

  # ----- SERVER (Express/TypeScript) -----
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

  # ----- AGENTS (Python/FastAPI) -----
  agents:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax
        run: python -m py_compile server.py

  # ----- DOCKER BUILD TEST -----
  docker:
    runs-on: ubuntu-latest
    needs: [client, server, agents]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/client/Dockerfile
          push: false
          tags: reject-client:test
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=pk_test_placeholder
            VITE_API_URL=http://localhost:8787

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/server/Dockerfile
          push: false
          tags: reject-server:test

      - name: Build agents image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/agents/Dockerfile
          push: false
          tags: reject-agents:test
