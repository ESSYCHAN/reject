# ============================================
# REJECT CI Pipeline
# ============================================
# Runs on every push and PR to main
# Tests all 3 services: client, server, agents

name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  # ----- CLIENT (React/TypeScript) -----
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          VITE_API_URL: http://localhost:8787

  # ----- SERVER (Express/TypeScript) -----
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

  # ----- AGENTS (Python/FastAPI) -----
  agents:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax
        run: python -m py_compile server.py

  # NOTE: The Docker build-test job was removed. Deploy target is Vercel
  # (client) + Railway (server) — neither uses these Dockerfiles. Railway
  # builds the server via Nixpacks (server/railway.json); Vercel builds the
  # client directly. The docker/ Dockerfiles and docker-compose are kept for
  # local use but are off the CI/deploy path. See DEPLOY.md.
