# ============================================
# REJECT Deploy Pipeline (DISABLED on push)
# ============================================
# Builds and pushes Docker images (client/server/agents) to ghcr.io.
#
# This is NOT the active deploy path. The platform deploys via:
#   - Client  -> Vercel  (auto-deploys from main; builds the client directly)
#   - Server  -> Railway (auto-deploys from main; Nixpacks, server/railway.json)
#   - Agents  -> not deployed for the current decode-quality phase
#
# This workflow only builds Docker images and pushes them to a registry — it
# does not deploy anywhere. It contradicted the Vercel+Railway plan and fired
# on every push, so the automatic trigger is removed. Kept as manual-only
# (workflow_dispatch) in case a registry-based/container deploy is revived.
# See DEPLOY.md for the live deploy steps.

name: Deploy (manual only)

on:
  workflow_dispatch:  # Manual trigger only — no longer runs on push

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      # Build and push all 3 images
      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/client/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-client:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-client:latest
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push agents
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/agents/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-agents:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-agents:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Deployed Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-client:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-agents:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
